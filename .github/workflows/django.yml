name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai_resumematcher/requirements.txt

    - name: Run Django System Integrity Checks
      # 🟢 This tells GitHub to jump inside your project folder before running the check
      run: |
        cd ai_resumematcher
        python manage.py check