name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Django System Integrity Checks
      env:
        # Pass temporary mock variables so the system check doesn't crash without a real .env
        SECRET_KEY: "temporary-ci-secret-key-for-evaluation-checks"
        GROQ_API_KEY: "gsk_mock_key_for_testing"
      run: |
        python manage.py check