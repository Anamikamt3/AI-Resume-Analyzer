<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - AI Resume Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-600 tracking-tight">Resume-Analyzer</h1>
            <p class="text-sm text-gray-500 mt-1">AI Resume Analyzer and Job Matcher.</p>
        </div>

        <div class="flex justify-around border-b pb-4 mb-6 text-lg font-semibold">
            <button id="showLoginBtn" onclick="toggleAuthMode('login')" class="text-blue-600 border-b-2 border-blue-600 pb-2 focus:outline-none">Login</button>
            <button id="showRegisterBtn" onclick="toggleAuthMode('register')" class="text-gray-400 pb-2 focus:outline-none">Register</button>
        </div>

        <form id="loginForm" onsubmit="return false" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="loginUsername" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="loginPassword" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <button type="button" id="loginSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition">Sign In</button>
        </form>

        <form id="registerForm" onsubmit="return false" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="regEmail" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="regUsername" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="regPassword" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <button type="button" id="registerSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition">Create Account</button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        function toggleAuthMode(mode) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginBtn = document.getElementById('showLoginBtn');
            const regBtn = document.getElementById('showRegisterBtn');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginBtn.className = "text-blue-600 border-b-2 border-blue-600 pb-2 focus:outline-none";
                regBtn.className = "text-gray-400 pb-2 focus:outline-none";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginBtn.className = "text-gray-400 pb-2 focus:outline-none";
                regBtn.className = "text-blue-600 border-b-2 border-blue-600 pb-2 focus:outline-none";
            }
        }
    </script>
</body>
</html>
